<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark warm background -->
  <rect width="100" height="100" rx="22" fill="#1a1408"/>
  <!-- Subtle gold border -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <!-- Gold diamond -->
  <polygon points="50,11 57,19 50,27 43,19" fill="#C9A84C"/>
  <!-- S&M bold gold -->
  <text x="50" y="60" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#C9A84C" text-anchor="middle" dominant-baseline="middle">S&amp;M</text>
  <!-- AUTO spaced below -->
  <text x="50" y="80" font-family="Georgia, serif" font-size="9" font-weight="400" fill="#C9A84C" text-anchor="middle" letter-spacing="3">AUTO</text>
</svg>
